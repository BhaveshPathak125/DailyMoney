<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day Editor | DailyMoney</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            surface: "#131313",
            "surface-container-low": "#1c1b1b",
            "surface-container-lowest": "#0e0e0e",
            "surface-container-high": "#2a2a2a",
            "surface-container-highest": "#353534",
            "on-surface": "#e5e2e1",
            "on-surface-variant": "#baccb0",
            primary: "#efffe3",
            "primary-container": "#39ff14",
            secondary: "#72de58",
            error: "#ffb4ab",
            "outline-variant": "#3c4b35",
            "on-primary": "#053900"
          },
          fontFamily: { headline: ["Manrope"], body: ["Inter"] }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .glass-panel { background: rgba(53, 53, 52, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .page-enter { animation: page-enter 0.45s ease-out; }
    .page-leave { animation: page-leave 0.22s ease-in forwards; }
    .interactive-card, .interactive-link, .interactive-button { transition: transform 0.25s ease, filter 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease, color 0.25s ease; }
    .interactive-card:hover, .interactive-link:hover, .interactive-button:hover { filter: brightness(1.08); transform: translateY(-2px); box-shadow: 0 18px 35px rgba(0, 0, 0, 0.22); }
    .calendar-day { transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
    .calendar-day:hover { transform: translateY(-1px); }
    .sidebar-shell, .topbar-shell, .main-shell { transition: width 0.28s ease, left 0.28s ease, margin-left 0.28s ease; }
    .sidebar-toggle { transition: transform 0.28s ease, background-color 0.25s ease, color 0.25s ease, filter 0.25s ease; }
    body.sidebar-collapsed .sidebar-shell { width: 5rem !important; }
    body.sidebar-collapsed .sidebar-brand-text,
    body.sidebar-collapsed .sidebar-subtext,
    body.sidebar-collapsed .sidebar-label { display: none !important; }
    body.sidebar-collapsed .topbar-shell { left: 5rem !important; width: calc(100% - 5rem) !important; }
    body.sidebar-collapsed .main-shell { margin-left: 5rem !important; }
    body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
    @keyframes page-enter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes page-leave { from { opacity: 1; } to { opacity: 0; transform: translateY(6px); } }
  </style>
</head>
<body class="bg-surface text-on-surface font-body page-enter">
  <aside class="sidebar-shell fixed left-0 top-0 h-screen z-50 flex flex-col bg-[#131313] w-20 md:w-64">
    <div class="p-6 flex items-center gap-3">
      <span class="material-symbols-outlined text-primary-container text-3xl">account_balance</span>
      <div class="hidden md:block">
        <h1 class="sidebar-brand-text text-xl font-bold tracking-tight text-[#EFFFE3] font-headline">DailyMoney</h1>
        <p class="sidebar-subtext text-[10px] text-on-surface-variant tracking-widest">PREMIUM FINANCE</p>
      </div>
    </div>
    <nav class="flex-1 mt-4 space-y-1">
      <a class="interactive-link flex items-center gap-4 text-[#E5E2E1]/60 px-4 py-3 mx-2 hover:bg-[#353534]/40 hover:text-[#39FF14]" href="{{ url_for('dashboard') }}"><span class="material-symbols-outlined">dashboard</span><span class="sidebar-label hidden md:block">Dashboard</span></a>
      <a class="interactive-link flex items-center gap-4 text-[#E5E2E1]/60 px-4 py-3 mx-2 hover:bg-[#353534]/40 hover:text-[#39FF14]" href="{{ url_for('daily_entry') }}"><span class="material-symbols-outlined">add_circle</span><span class="sidebar-label hidden md:block">Daily Entry</span></a>
      <a class="interactive-link flex items-center gap-4 text-[#E5E2E1]/60 px-4 py-3 mx-2 hover:bg-[#353534]/40 hover:text-[#39FF14]" href="{{ url_for('monthly_insights') }}"><span class="material-symbols-outlined">insights</span><span class="sidebar-label hidden md:block">Insights</span></a>
      <a class="interactive-link flex items-center gap-4 text-[#E5E2E1]/60 px-4 py-3 mx-2 hover:bg-[#353534]/40 hover:text-[#39FF14]" href="{{ url_for('yearly_analysis') }}"><span class="material-symbols-outlined">leaderboard</span><span class="sidebar-label hidden md:block">Yearly</span></a>
      <a class="interactive-link flex items-center gap-4 bg-[#2A2A2A] text-[#39FF14] rounded-lg px-4 py-3 mx-2" href="{{ url_for('day_editor') }}"><span class="material-symbols-outlined">edit_calendar</span><span class="sidebar-label hidden md:block">Day Editor</span></a>
    </nav>
  </aside>

  <header class="topbar-shell fixed top-0 right-0 w-full md:left-64 md:w-[calc(100%-16rem)] z-40 flex justify-between items-center px-8 h-20 bg-[#131313]/80 backdrop-blur-md">
    <div class="flex items-center gap-4">
      <button id="sidebarToggle" type="button" class="sidebar-toggle interactive-button w-11 h-11 rounded-xl bg-surface-container-low text-primary-container flex items-center justify-center border border-outline-variant/10" aria-label="Toggle sidebar">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <h2 class="text-2xl font-black text-[#39FF14] italic font-headline">DailyMoney</h2>
    </div>
    <div class="text-sm text-on-surface-variant">Day Editor</div>
  </header>

  <main class="main-shell pt-24 pb-12 px-8 ml-20 md:ml-64 min-h-screen">
    <div class="grid grid-cols-12 gap-6">
      {% include "partials/yearly_editor.html" %}
    </div>
  </main>

  <script>
    const syncSidebar = () => {
      document.body.classList.toggle('sidebar-collapsed', localStorage.getItem('dm_sidebar') === 'collapsed');
    };
    syncSidebar();
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
      const nextState = localStorage.getItem('dm_sidebar') === 'collapsed' ? 'open' : 'collapsed';
      localStorage.setItem('dm_sidebar', nextState);
      syncSidebar();
    });

    const bindDayEditorNavigation = () => {
      const panel = document.getElementById('yearly-editor-panel');
      if (!panel) return;

      panel.querySelectorAll('.yearly-editor-link').forEach((link) => {
        link.addEventListener('click', async (event) => {
          event.preventDefault();
          const response = await fetch(link.href, { headers: { 'X-Requested-With': 'fetch' } });
          if (!response.ok) return;
          panel.outerHTML = await response.text();
          bindDayEditorNavigation();
        });
      });

      const form = panel.querySelector('.yearly-editor-form');
      if (form) {
        form.addEventListener('submit', async (event) => {
          event.preventDefault();
          const params = new URLSearchParams(new FormData(form));
          const response = await fetch(`${form.action}?${params.toString()}`, { headers: { 'X-Requested-With': 'fetch' } });
          if (!response.ok) return;
          panel.outerHTML = await response.text();
          bindDayEditorNavigation();
        });
      }
    };
    bindDayEditorNavigation();

    document.querySelectorAll('a[href^="/"]').forEach((link) => {
      if (link.classList.contains('yearly-editor-link')) return;
      link.addEventListener('click', (event) => {
        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
        document.body.classList.add('page-leave');
      });
    });
  </script>
</body>
</html>
