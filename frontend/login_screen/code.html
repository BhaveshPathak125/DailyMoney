<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Kinetic Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "secondary-container": "#3aa625",
              "secondary-fixed": "#8dfc71",

              "on-primary": "#053900",
              "error-container": "#93000a",
              "secondary": "#72de58",
              "tertiary": "#fff8f7",
              "background": "#131313",
              "surface-container-highest": "#353534",
              "surface-container-high": "#2a2a2a",
              "error": "#ffb4ab",
              "on-secondary-container": "#043200",
              "tertiary-container": "#ffd3ce",
              "on-secondary": "#053900",
              "on-tertiary-container": "#7a5955",
              "on-surface-variant": "#baccb0",
              "inverse-primary": "#106e00",
              "on-primary-fixed-variant": "#095300",
              "on-error": "#690005",
              "inverse-on-surface": "#313030",

<style>
        body {
            background-color: #131313;
            color: #e5e2e1;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .geometric-bg {
            background-image: 
                linear-gradient(30deg, #1c1b1b 12%, transparent 12.5%, transparent 87%, #1c1b1b 87.5%, #1c1b1b),
                linear-gradient(150deg, #1c1b1b 12%, transparent 12.5%, transparent 87%, #1c1b1b 87.5%, #1c1b1b),
                linear-gradient(30deg, #1c1b1b 12%, transparent 12.5%, transparent 87%, #1c1b1b 87.5%, #1c1b1b),
                linear-gradient(150deg, #1c1b1b 12%, transparent 12.5%, transparent 87%, #1c1b1b 87.5%, #1c1b1b),
                linear-gradient(60deg, #161616 25%, transparent 25.5%, transparent 75%, #161616 75%, #161616),
                linear-gradient(60deg, #161616 25%, transparent 25.5%, transparent 75%, #161616 75%, #161616);
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
        }
    </style>
</head>
<body class="font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Hero/Background Section -->
<main class="relative min-h-screen w-full flex items-center justify-center overflow-hidden geometric-bg px-6 py-12">
<!-- Abstract Glow Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-fixed-dim/5 blur-[120px] rounded-full"></div>
<!-- Login Container -->
<div class="relative z-10 w-full max-w-[480px]">
<!-- Logo Area -->
<div class="flex flex-col items-center mb-10">
<div class="mb-4">
<span class="material-symbols-outlined text-primary-container text-5xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-headline text-2xl font-black italic tracking-tight text-primary-container">
                    The Kinetic Ledger
                </h1>
<p class="font-body text-on-surface-variant text-sm mt-2 opacity-60">
                    Premium Financial Intelligence
                </p>
</div>
<!-- Login Card (Glassmorphism) -->
<div class="bg-surface-container-highest/40 backdrop-blur-[24px] rounded-xl p-8 md:p-10 shadow-[0px_24px_48px_rgba(0,0,0,0.8)] border border-outline-variant/10">
<header class="mb-8">
<h2 class="font-headline text-xl font-bold text-on-surface">Welcome Back</h2>
<p class="text-on-surface-variant text-sm mt-1">Please enter your details to sign in.</p>
</header>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label text-label-sm tracking-wider text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg group-focus-within:text-primary-container transition-colors">alternate_email</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface text-sm rounded-lg py-4 pl-12 pr-4 focus:ring-0 focus:border-primary-fixed-dim transition-all outline-none" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label text-label-sm tracking-wider text-on-surface-variant uppercase" for="password">Password</label>
<a class="text-[10px] font-bold text-primary-fixed-dim hover:text-primary transition-colors uppercase tracking-tighter" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg group-focus-within:text-primary-container transition-colors">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface text-sm rounded-lg py-4 pl-12 pr-4 focus:ring-0 focus:border-primary-fixed-dim transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full py-4 rounded-lg bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-base shadow-[0px_0px_20px_rgba(57,255,20,0.2)] hover:shadow-[0px_0px_30px_rgba(57,255,20,0.4)] active:scale-[0.98] transition-all" type="submit">
                        Log In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/10"></div>
</div>
<span class="relative bg-transparent px-4 text-xs font-label text-on-surface-variant/40 tracking-widest uppercase">Or continue with</span>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg bg-surface-container-high hover:bg-surface-container-highest transition-colors border border-outline-variant/5">
<img alt="Google" class="w-5 h-5 grayscale opacity-70 group-hover:grayscale-0" data-alt="Official Google G logo in flat vector style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBadAA0PwQX4NB0jCZ7UO3b3kTn25-CvqoSk_H7ZTKfXWVaUjXtaCqzzOl75GFWB9o68yJeGq3Sat9oHRHWbAUyfYMt3bOcI3e9P4Qv3Fl1ywcsJgkl4mNv2YWG9WdJ5Q7DqsJkE5Abl_Pnr3n9sOq7dBqYJq50qflfWCD_nDG20kFgXcbSt-210CgTBIM44D4MddzWjGmbU556qipuLP2yFnaBqawZ6MWqnksy1JtzFlsiOXZsai9yk1JJwITZABykJJtqMgK4-qW3"/>
<span class="text-xs font-medium text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg bg-surface-container-high hover:bg-surface-container-highest transition-colors border border-outline-variant/5">
<span class="material-symbols-outlined text-on-surface text-lg">ios</span>
<span class="text-xs font-medium text-on-surface">Apple</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm">
                    Don't have an account? 
                    <a class="text-primary-container font-bold hover:underline ml-1" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Subtle Floating Elements for Premium Feel -->
<div class="absolute top-20 right-20 hidden lg:block opacity-20 pointer-events-none">
<div class="p-4 bg-surface-container-low rounded-xl border border-outline-variant/10 rotate-12">
<span class="material-symbols-outlined text-primary-fixed text-4xl" style="font-variation-settings: 'FILL' 1;">trending_up</span>
</div>
</div>
<div class="absolute bottom-20 left-20 hidden lg:block opacity-20 pointer-events-none">
<div class="p-4 bg-surface-container-low rounded-xl border border-outline-variant/10 -rotate-12">
<span class="material-symbols-outlined text-primary-fixed text-4xl" style="font-variation-settings: 'FILL' 1;">insights</span>
</div>
</div>
</main>
</body></html>
